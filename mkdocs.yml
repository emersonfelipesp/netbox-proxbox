site_name: Proxbox Docs
site_dir: ./site
site_url: https://emersonfelipesp.github.io/netbox-proxbox/
docs_dir: ./docs
repo_name: netdevopsbr/netbox-proxbox
repo_url: https://github.com/netdevopsbr/netbox-proxbox
theme:
  name: material
  custom_dir: docs/_theme/
  icon:
    repo: fontawesome/brands/github
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep-orange
      toggle:
        icon: material/lightbulb-outline
        name: Switch to Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/lightbulb
        name: Switch to Light Mode
  features:
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - navigation.footer
    - navigation.path
    - navigation.top
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            extensions:
              - griffe_typingdoc
            show_bases: true
            #show_root_heading: true
            show_if_no_docstring: true
            inherited_members: true
            #members_order: source
            #separate_signature: true
            #unwrap_annotated: true
            #merge_init_into_class: true
            #docstring_section_style: spacy
            #signature_crossrefs: true
hooks:
  - docs/hooks.py

nav:
  - Proxbox: index.md
  - Installation:
    - Overview: 'installation/index.md'
    - Pre-Installation: 'installation/pre-installation.md'
    - Installing the Plugin:
      - Using pip: 'installation/1-installing-plugin.md'
      - Using git (recommended): 'installation/2-installing-plugin-git.md'
      - Using Docker: 'installation/3-installing-plugin-docker.md'
    - Backend Setup: 'installation/backend-setup.md'
    - Upgrading: 'installation/upgrading.md'
  - Backend:
    - Overview: 'backend/index.md'
    - Using pip: 'backend/using-pip.md'
    - Using git: 'backend/using-git.md'
    - Using Docker: 'backend/using-docker.md'
  - Configuration:
    - Overview: 'configuration/index.md'
    - Required Parameters: 'configuration/required-parameters.md'
    - Plugin Settings: 'configuration/plugin-settings.md'
  - CLI:
    - Overview: 'cli/index.md'
    - Command Reference: 'reference/proxbox-cli/command-catalog/index.md'
    - Command Examples:
      - Overview: 'reference/proxbox-cli/command-examples/index.md'
      - Core Commands: 'reference/proxbox-cli/command-examples/core-commands.md'
      - NetBox Commands: 'reference/proxbox-cli/command-examples/netbox-commands.md'
      - Proxmox Commands: 'reference/proxbox-cli/command-examples/proxmox-commands.md'
      - Infrastructure Commands: 'reference/proxbox-cli/command-examples/infrastructure-commands.md'
  - Developer:
    - Proxbox CLI Docgen: 'developer/proxbox-cli-docgen.md'
    - Local Proxmox Mock: 'developer/proxmox-mock-local.md'
    - Raw CLI Capture: 'generated/proxbox-cli-command-capture.md'
  - User Guide:
    - Cluster and Node Tracking: 'user-guide/cluster-nodes.md'
  - API Reference:
    - Overview: 'api/index.md'
    - Endpoints: 'api/endpoints.md'
    - Infrastructure: 'api/infrastructure.md'
    - VM Data: 'api/vm-data.md'
    - Operations: 'api/operations.md'
    - Settings: 'api/settings.md'
  - Features:
    - E2E Docker Testing: 'features/e2e-docker-testing.md'
    - Synchronized Data: 'features/synchronized-data.md'
    - Scheduled Sync: 'features/scheduled-sync.md'
    - Background Jobs: 'features/background-jobs.md'
    - Virtual Machine: 'features/virtual-machine.md'
    - Containers: 'features/containers.md'
    - Network: 'features/network.md'
    - VLAN Management: 'features/vlan-management.md'
    - Storage: 'features/storage.md'
    - Backup: 'features/backup.md'
    - Backup Routines: 'features/backup-routines.md'
    - Replications: 'features/replications.md'
    - Backend Logs: 'features/backend-logs.md'
    - Monitoring: 'features/monitoring.md'
    - API Integration: 'features/api-integration.md'
  - Data Model:
    - Virtual Machine: 'models/virtual-machine.md'
    - Containers: 'models/containers.md'
    - Other Models: 'models/others.md'
  - Release Notes:
    - Summary: 'release-notes/index.md'
    - Version 0.0.10: 'release-notes/version-0.0.10.md'
    - Version 0.0.9.post4: 'release-notes/version-0.0.9.post4.md'
    - Version 0.0.9: 'release-notes/version-0.0.9.md'
    - Version 0.0.8: 'release-notes/version-0.0.8.md'
    - Version 0.0.7: 'release-notes/version-0.0.7.md'
    - Version 0.0.6: 'release-notes/version-0.0.6.md'
    - Version 0.0.5: 'release-notes/version-0.0.5.md'
    - Version 0.0.4: 'release-notes/version-0.0.4.md'
    - Version 0.0.3: 'release-notes/version-0.0.3.md'
    - Version 0.0.2: 'release-notes/version-0.0.2.md'
    - Version 0.0.1: 'release-notes/version-0.0.1.md'
  - Roadmap: 'roadmap.md'
extra:
  homepage: https://netboxlabs.com
extra_css:
  - https://cdn.materialdesignicons.com/5.4.55/css/materialdesignicons.min.css
  - extra.css
markdown_extensions:
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - abbr
  - toc:
      permalink: true
      toc_depth: 4
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
extra_javascript:
  - 'https://cdn.jsdelivr.net/npm/@material-icons/iconfont/material-icons.min.js'
