name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff and bandit
        run: pip install ruff bandit

      - name: Run ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Run bandit (security lint)
        run: bandit -r netbox_proxbox proxbox_cli -ll

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,dev,cli]"

      - name: Run ty
        run: ty check proxbox_cli

  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Compile package
        run: python -m compileall netbox_proxbox tests

  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build and validate package metadata
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, compile, package]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run mocked test suite
        # -p no:django: this suite runs against the Django/NetBox stubs in
        # tests/conftest.py, which register `django` as a plain module rather
        # than a package. pytest-django (pulled in by the `test` extra) then
        # aborts collection with an INTERNALERROR from its
        # pytest_collection_modifyitems hook:
        #   ModuleNotFoundError: No module named 'django.test'; 'django' is not a package
        # The mocked suite uses no pytest-django fixture or marker. The
        # NetBox-backed job in django-tests.yml keeps the plugin enabled.
        run: pytest -p no:django --cov=netbox_proxbox --cov-report=term-missing --cov-report=xml tests

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: netbox-proxbox-coverage
          path: coverage.xml
