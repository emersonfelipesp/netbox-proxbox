name: Django Tests

# Runs the NetBox-backed Django TestCase suite for the sync-state sidecar
# models. The regular "CI" workflow installs only the project plus pytest, so
# the Django-dependent tests (models, migrations, backfill, API, ETag) skip
# there and do not gate merges. This workflow provisions a real NetBox source
# tree plus PostgreSQL and Redis and runs those tests as a required check,
# across the supported NetBox minor versions.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  django-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Declared support is NetBox 4.5.8 - 4.6.99. Gate the minimum,
        # the last validated 4.5 patch, and both the 4.6 line floor/latest
        # validated patch in step with netbox_proxbox/__init__.py.
        netbox: ["v4.5.8", "v4.5.9", "v4.6.0", "v4.6.4"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
          POSTGRES_DB: netbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netbox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          path: netbox-proxbox

      - name: Checkout NetBox ${{ matrix.netbox }}
        uses: actions/checkout@v6
        with:
          repository: netbox-community/netbox
          ref: ${{ matrix.netbox }}
          path: netbox

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install NetBox and plugin
        run: |
          python -m pip install --upgrade pip
          pip install -r netbox/requirements.txt
          pip install -e "netbox-proxbox[test]"

      - name: Run NetBox-backed sync-state tests
        working-directory: netbox-proxbox
        env:
          # pytest-django and tests/test_sync_state_models.py both use these.
          # The NetBox test configuration (netbox.configuration_testing)
          # points DB/redis at localhost with the netbox/netbox credentials
          # created by the service containers above.
          NETBOX_CONFIGURATION: tests.netbox_test_configuration
          DJANGO_SETTINGS_MODULE: netbox.settings
          # Make a missing/broken NetBox harness a hard failure here instead of
          # a silent skip, so this job genuinely gates merges.
          NETBOX_PROXBOX_REQUIRE_DJANGO: "1"
          PYTHONPATH: ${{ github.workspace }}/netbox/netbox:${{ github.workspace }}/netbox-proxbox
        run: |
          pytest tests/test_sync_state_models.py tests/test_sync_state_contracts.py \
            --ds=netbox.settings --reuse-db --create-db -v --no-header
