name: E2E Docker

on:
  workflow_call:
    inputs:
      install_source:
        description: "Install source selection: both, local, pypi, container, or testpypi"
        required: false
        type: string
        default: both
      dependency_mode:
        description: "dev = build proxbox-api from GitHub source; published = pull from Docker Hub; testpypi-package/pypi-package = install proxbox-api from that index"
        required: false
        type: string
        default: dev
      proxbox_api_version:
        description: "proxbox-api package version for testpypi-package or pypi-package modes. Empty = workflow default."
        required: false
        type: string
        default: ""
      proxbox_api_runtime:
        description: "proxbox-api runtime selection: both, python, or pyo3-rust"
        required: false
        type: string
        default: both
      netbox_image:
        description: "Override NetBox image (e.g. netboxcommunity/netbox:v4.6.0). Empty = workflow default."
        required: false
        type: string
        default: ""
      proxmox_service:
        description: "Proxmox service mock selection: pve, pbs, pdm, or all"
        required: false
        type: string
        default: all
  workflow_dispatch:
    inputs:
      install_source:
        description: "Install source selection: both, local, pypi, container, or testpypi"
        required: false
        type: choice
        options:
          - both
          - local
          - pypi
          - container
          - testpypi
        default: both
      dependency_mode:
        description: "proxbox-api source"
        required: false
        type: choice
        options:
          - dev
          - published
          - testpypi-package
          - pypi-package
        default: dev
      proxbox_api_version:
        description: "proxbox-api package version for testpypi-package or pypi-package modes. Empty = workflow default."
        required: false
        type: string
        default: ""
      proxbox_api_runtime:
        description: "proxbox-api runtime"
        required: false
        type: choice
        options:
          - both
          - python
          - pyo3-rust
        default: both
      netbox_image:
        description: "Override NetBox image (full ref). Leave empty for workflow default."
        required: false
        type: string
        default: ""
      proxmox_service:
        description: "Proxmox service mock"
        required: false
        type: choice
        options:
          - all
          - pve
          - pbs
          - pdm
        default: all
  schedule:
    - cron: "31 2 * * *"

env:
  PROXBOX_API_RELEASE_VERSION: 0.0.16.post1
  PROXBOX_API_IMAGE: emersonfelipesp/proxbox-api
  PROXMOX_SDK_IMAGE: emersonfelipesp/proxmox-sdk
  PROXMOX_SDK_TAG_PREFIX: latest
  PROXBOX_ENCRYPTION_KEY: proxbox-ci-only-encryption-key-not-a-secret

jobs:
  e2e-docker-stack:
    name: E2E Docker / ${{ matrix.install_source }} / ${{ matrix.netbox_image }} / api=${{ matrix.proxbox_api_runtime }} / proxmox=${{ matrix.proxmox_service }} [${{ matrix.network_stack }}]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: ${{ matrix.proxbox_api_runtime == 'pyo3-rust' }}
    env:
      NETBOX_IMAGE: ${{ matrix.netbox_image }}
    strategy:
      fail-fast: false
      matrix:
        install_source: ${{ fromJSON(inputs.install_source != 'both' && format('["{0}"]', inputs.install_source) || '["local","pypi","container"]') }}
        # NetBox 4.6.1 is supported in code (min/max range covers it) but is omitted
        # from e2e because netboxcommunity/netbox:v4.6.1 is not yet published on
        # Docker Hub and the upstream netbox-docker source-build fallback fails on
        # Ubuntu 24.04 (libxmlsec1-openssl1 apt package no longer available).
        # Re-add once netbox-community/netbox-docker ships the v4.6.1 image.
        netbox_image: ${{ fromJSON(inputs.netbox_image != '' && format('["{0}"]', inputs.netbox_image) || '["netboxcommunity/netbox:v4.5.8","netboxcommunity/netbox:v4.5.9","netboxcommunity/netbox:v4.6.0"]') }}
        network_stack: [ipv4]
        proxbox_api_runtime: ${{ fromJSON((inputs.proxbox_api_runtime == 'python' || inputs.proxbox_api_runtime == 'pyo3-rust') && format('["{0}"]', inputs.proxbox_api_runtime) || '["python","pyo3-rust"]') }}
        proxmox_service: ${{ fromJSON((inputs.proxmox_service == 'pve' || inputs.proxmox_service == 'pbs' || inputs.proxmox_service == 'pdm') && format('["{0}"]', inputs.proxmox_service) || '["pve","pbs","pdm"]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Resolve plugin install source
        run: |
          set -eux
          # NETBOX_PLUGIN_INSTALL_INDEX is only set for testpypi; otherwise empty so
          # the in-container `uv pip install` line does not pass any --index-url flag.
          echo "NETBOX_PLUGIN_INSTALL_INDEX=" >> "$GITHUB_ENV"
          if [ "${{ matrix.install_source }}" = "local" ]; then
            echo "NETBOX_PLUGIN_INSTALL_SPEC=/tmp/netbox-proxbox" >> "$GITHUB_ENV"
            echo "NETBOX_PLUGIN_MOUNT=-v $PWD:/tmp/netbox-proxbox:ro" >> "$GITHUB_ENV"
          elif [ "${{ matrix.install_source }}" = "pypi" ]; then
            VERSION=$(python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")
            echo "NETBOX_PLUGIN_INSTALL_SPEC=netbox-proxbox==${VERSION}" >> "$GITHUB_ENV"
            echo "NETBOX_PLUGIN_MOUNT=" >> "$GITHUB_ENV"
          elif [ "${{ matrix.install_source }}" = "testpypi" ]; then
            VERSION=$(python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")
            echo "NETBOX_PLUGIN_INSTALL_SPEC=netbox-proxbox==${VERSION}" >> "$GITHUB_ENV"
            # uv refuses to mix indexes for the same package by default
            # ("dependency confusion attack" protection). netbox-proxbox lives on
            # both PyPI (older stable) and TestPyPI (current rcN); we need uv to
            # consider both, hence --index-strategy unsafe-best-match.
            echo "NETBOX_PLUGIN_INSTALL_INDEX=--index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ --index-strategy unsafe-best-match" >> "$GITHUB_ENV"
            echo "NETBOX_PLUGIN_MOUNT=" >> "$GITHUB_ENV"
          else
            # Keep 'container' mode for workflow compatibility, but use package install.
            echo "NETBOX_PLUGIN_INSTALL_SPEC=netbox-proxbox" >> "$GITHUB_ENV"
            echo "NETBOX_PLUGIN_MOUNT=" >> "$GITHUB_ENV"
          fi

      - name: Resolve proxbox-api runtime source
        run: |
          set -eux
          PROXBOX_API_VERSION="${{ inputs.proxbox_api_version }}"
          if [ -z "${PROXBOX_API_VERSION}" ]; then
            PROXBOX_API_VERSION="${PROXBOX_API_RELEASE_VERSION}"
          fi
          echo "PROXBOX_API_VERSION=${PROXBOX_API_VERSION}" >> "$GITHUB_ENV"
          echo "PROXBOX_API_RUNTIME=${{ matrix.proxbox_api_runtime }}" >> "$GITHUB_ENV"
          echo "PROXBOX_API_PACKAGE_INDEX=" >> "$GITHUB_ENV"
          if [ "${{ inputs.dependency_mode }}" = "testpypi-package" ]; then
            echo "PROXBOX_API_PACKAGE_INDEX=--index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/" >> "$GITHUB_ENV"
          elif [ "${{ inputs.dependency_mode }}" = "pypi-package" ]; then
            echo "PROXBOX_API_PACKAGE_INDEX=--index-url https://pypi.org/simple/" >> "$GITHUB_ENV"
          fi
          if [ "${{ matrix.proxbox_api_runtime }}" = "pyo3-rust" ]; then
            echo "PROXBOX_API_BUILD_TARGET=raw-pyo3-rust" >> "$GITHUB_ENV"
            echo "PROXBOX_API_DOCKER_TAG=${PROXBOX_API_VERSION}-pyo3-rust" >> "$GITHUB_ENV"
            echo "PROXBOX_API_PACKAGE_SPEC=proxbox-api[pyo3-rust]==${PROXBOX_API_VERSION}" >> "$GITHUB_ENV"
          elif [ "${{ matrix.proxbox_api_runtime }}" = "python" ]; then
            echo "PROXBOX_API_BUILD_TARGET=raw" >> "$GITHUB_ENV"
            echo "PROXBOX_API_DOCKER_TAG=${PROXBOX_API_VERSION}" >> "$GITHUB_ENV"
            echo "PROXBOX_API_PACKAGE_SPEC=proxbox-api==${PROXBOX_API_VERSION}" >> "$GITHUB_ENV"
          else
            echo "Unsupported proxbox-api runtime: ${{ matrix.proxbox_api_runtime }}" >&2
            exit 1
          fi

      - name: Start E2E stack
        run: |
          set -eux
          if [ "${{ matrix.network_stack }}" = "ipv6" ]; then
            docker network create --ipv6 --subnet fd00:e2e::/64 proxbox-e2e || true
            HOST_BIND="[::]:"
            TEST_HOST="[::1]"
          else
            docker network create proxbox-e2e || true
            HOST_BIND=""
            TEST_HOST="127.0.0.1"
          fi
          {
            echo "HOST_BIND=${HOST_BIND}"
            echo "TEST_HOST=${TEST_HOST}"
          } >> "$GITHUB_ENV"
          SECRET_KEY='proxbox-e2e-secret-key-proxbox-e2e-secret-key-proxbox-e2e-secret-key'

          docker rm -f netbox-e2e-postgres netbox-e2e-redis netbox-e2e netbox-e2e-rqworker proxbox-e2e-api proxmox-e2e-mock 2>/dev/null || true

          docker run -d --name netbox-e2e-postgres --network proxbox-e2e \
            -e POSTGRES_DB=netbox \
            -e POSTGRES_USER=netbox \
            -e POSTGRES_PASSWORD=netbox \
            --health-cmd="pg_isready -U netbox -d netbox" \
            --health-interval=2s \
            --health-timeout=2s \
            --health-retries=30 \
            postgres:16-alpine

          docker run -d --name netbox-e2e-redis --network proxbox-e2e \
            redis:7-alpine

          echo "Waiting for postgres to be healthy..."
          for i in $(seq 1 60); do
            health="$(docker inspect --format '{{.State.Health.Status}}' netbox-e2e-postgres 2>/dev/null || echo unknown)"
            if [ "$health" = "healthy" ]; then
              echo "postgres healthy after ${i} iterations"
              break
            fi
            sleep 1
            if [ "$i" -eq 60 ]; then
              echo "postgres did not become healthy in 60s"
              docker logs netbox-e2e-postgres || true
              exit 1
            fi
          done

          # PVE needs HTTPS because the plugin's ProxmoxEndpoint always connects via TLS;
          # the published latest-pve image (pypi-raw target) is HTTP-only.  Pull
          # latest-nginx for PVE (mkcert-fronted TLS on port 8000) and override
          # PROXMOX_MOCK_SERVICE at runtime.  PDM/PBS keep the HTTP per-service tag.
          if [ "${{ matrix.proxmox_service }}" = "pve" ]; then
            PROXMOX_MOCK_IMAGE_REF="${PROXMOX_SDK_IMAGE}:${PROXMOX_SDK_TAG_PREFIX}-nginx"
          else
            PROXMOX_MOCK_IMAGE_REF="${PROXMOX_SDK_IMAGE}:${PROXMOX_SDK_TAG_PREFIX}-${{ matrix.proxmox_service }}"
          fi
          echo "PROXMOX_MOCK_IMAGE_REF=${PROXMOX_MOCK_IMAGE_REF}" >> "$GITHUB_ENV"
          docker pull "${PROXMOX_MOCK_IMAGE_REF}"
          if ! docker pull "${NETBOX_IMAGE}" 2>/dev/null; then
            NETBOX_VERSION="${NETBOX_IMAGE##*:}"
            git clone --depth 1 https://github.com/netbox-community/netbox-docker.git /tmp/netbox-docker
            git clone --depth 1 --branch "${NETBOX_VERSION}" \
              https://github.com/netbox-community/netbox.git /tmp/netbox-docker/.netbox
            docker build \
              --build-arg "FROM=ubuntu:24.04" \
              --build-arg "NETBOX_PATH=.netbox" \
              -t "${NETBOX_IMAGE}" \
              /tmp/netbox-docker
          fi

          docker run -d --name proxmox-e2e-mock --network proxbox-e2e -p "${HOST_BIND}18006:8000" \
            -v "$PWD/tests/e2e/proxmox_openapi_mock_data.json:/data/mock-data.json:ro" \
            -e PROXMOX_MOCK_DATA_PATH=/data/mock-data.json \
            -e PROXMOX_MOCK_SCHEMA_VERSION=none \
            -e PROXMOX_MOCK_SERVICE="${{ matrix.proxmox_service }}" \
            -e APP_MODULE=proxmox_sdk.mock_main:app \
            "${PROXMOX_MOCK_IMAGE_REF}"

          # Per-service mock URLs.  PVE serves HTTPS via the nginx image with a
          # self-signed mkcert cert; PDM/PBS serve plain HTTP from pypi-raw.
          if [ "${{ matrix.proxmox_service }}" = "pve" ]; then
            echo "PROXMOX_MOCK_PROBE_URL=https://${TEST_HOST}:18006/health" >> "$GITHUB_ENV"
            echo "PROXMOX_MOCK_PROBE_FLAGS=-sk" >> "$GITHUB_ENV"
            echo "PROXMOX_MOCK_BASE_URL=https://${TEST_HOST}:18006" >> "$GITHUB_ENV"
          else
            echo "PROXMOX_MOCK_PROBE_URL=http://${TEST_HOST}:18006/health" >> "$GITHUB_ENV"
            echo "PROXMOX_MOCK_PROBE_FLAGS=-s" >> "$GITHUB_ENV"
            echo "PROXMOX_MOCK_BASE_URL=http://${TEST_HOST}:18006" >> "$GITHUB_ENV"
          fi

          if [ "${{ matrix.network_stack }}" = "ipv6" ]; then
            PROXBOX_BIND_HOST_VALUE="::"
          else
            PROXBOX_BIND_HOST_VALUE="0.0.0.0"
          fi

          PROXBOX_API_RUNTIME_ARGS=()
          if [ "${PROXBOX_API_RUNTIME}" = "pyo3-rust" ]; then
            PROXBOX_API_RUNTIME_ARGS=(-e PROXBOX_RECONCILIATION_ENGINE=rust)
          fi

          start_proxbox_api_container() {
            image_ref="$1"
            docker run -d --name proxbox-e2e-api --network proxbox-e2e -p "${HOST_BIND}18800:8000" \
              -e PROXBOX_SKIP_NETBOX_BOOTSTRAP=true \
              -e PROXBOX_ENCRYPTION_KEY \
              -e PROXBOX_BIND_HOST="${PROXBOX_BIND_HOST_VALUE}" \
              "${PROXBOX_API_RUNTIME_ARGS[@]}" \
              "${image_ref}"
          }

          if [ "${{ inputs.dependency_mode }}" = "published" ]; then
            docker pull "${PROXBOX_API_IMAGE}:${PROXBOX_API_DOCKER_TAG}"
            start_proxbox_api_container "${PROXBOX_API_IMAGE}:${PROXBOX_API_DOCKER_TAG}"
          elif [ "${{ inputs.dependency_mode }}" = "testpypi-package" ] || [ "${{ inputs.dependency_mode }}" = "pypi-package" ]; then
            cat > /tmp/proxbox-api-package.Dockerfile <<'EOF'
          FROM python:3.13-slim
          RUN python -m pip install --upgrade pip
          ARG PROXBOX_API_PACKAGE_INDEX
          ARG PROXBOX_API_PACKAGE_SPEC
          RUN python -m pip install --no-cache-dir ${PROXBOX_API_PACKAGE_INDEX} "${PROXBOX_API_PACKAGE_SPEC}"
          CMD ["python", "-m", "uvicorn", "proxbox_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          EOF
            if docker build \
              --build-arg "PROXBOX_API_PACKAGE_INDEX=${PROXBOX_API_PACKAGE_INDEX}" \
              --build-arg "PROXBOX_API_PACKAGE_SPEC=${PROXBOX_API_PACKAGE_SPEC}" \
              -t proxbox-api-e2e:package \
              -f /tmp/proxbox-api-package.Dockerfile \
              /tmp; then
              start_proxbox_api_container proxbox-api-e2e:package
            elif [ "${PROXBOX_API_RUNTIME}" = "pyo3-rust" ]; then
              echo "::warning title=proxbox-api pyo3-rust package extra unavailable::Falling back to ${PROXBOX_API_IMAGE}:${PROXBOX_API_DOCKER_TAG}"
              docker pull "${PROXBOX_API_IMAGE}:${PROXBOX_API_DOCKER_TAG}"
              start_proxbox_api_container "${PROXBOX_API_IMAGE}:${PROXBOX_API_DOCKER_TAG}"
            else
              exit 1
            fi
          else
            git clone --depth 1 https://github.com/emersonfelipesp/proxbox-api.git /tmp/proxbox-api-src
            docker build --target "${PROXBOX_API_BUILD_TARGET}" -t proxbox-api-e2e:dev /tmp/proxbox-api-src
            start_proxbox_api_container proxbox-api-e2e:dev
          fi

          if [ -n "${NETBOX_PLUGIN_MOUNT}" ]; then
            # shellcheck disable=SC2086
            docker run -d --name netbox-e2e --network proxbox-e2e -p "${HOST_BIND}18080:8080" ${NETBOX_PLUGIN_MOUNT} \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e DB_WAIT_DEBUG=1 \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              -e SUPERUSER_NAME=admin \
              -e SUPERUSER_EMAIL=admin@example.com \
              -e SUPERUSER_PASSWORD=admin \
              -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox" \
              -e LOGIN_REQUIRED=True \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "i=0; until uv pip install --upgrade ${NETBOX_PLUGIN_INSTALL_INDEX} ${NETBOX_PLUGIN_INSTALL_SPEC}; do i=\$((i+1)); [ \$i -ge 30 ] && exit 1; sleep 10; done && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/launch-netbox.sh"
          else
            docker run -d --name netbox-e2e --network proxbox-e2e -p "${HOST_BIND}18080:8080" \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e DB_WAIT_DEBUG=1 \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              -e SUPERUSER_NAME=admin \
              -e SUPERUSER_EMAIL=admin@example.com \
              -e SUPERUSER_PASSWORD=admin \
              -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox" \
              -e LOGIN_REQUIRED=True \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "i=0; until uv pip install --upgrade ${NETBOX_PLUGIN_INSTALL_INDEX} ${NETBOX_PLUGIN_INSTALL_SPEC}; do i=\$((i+1)); [ \$i -ge 30 ] && exit 1; sleep 10; done && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/launch-netbox.sh"
          fi

      - name: Verify proxbox-api PyO3/Rust runtime
        if: matrix.proxbox_api_runtime == 'pyo3-rust'
        run: |
          set -eux
          docker exec proxbox-e2e-api python -c "import os; from proxbox_api.services.sync.reconciliation.rust_bridge import rust_available; assert os.environ.get('PROXBOX_RECONCILIATION_ENGINE') == 'rust'; assert rust_available()"

      - name: Get container IPs
        run: |
          set -eux
          echo "Waiting for containers to get IPs..."
          sleep 5

          if [ "${{ matrix.network_stack }}" = "ipv6" ]; then
            INSPECT_FIELD='.GlobalIPv6Address'
            # NetBox's gunicorn binds 0.0.0.0:8080, so proxbox-api's callback
            # uses the container hostname (resolved by Docker DNS to AAAA+A on
            # the dual-stack bridge) and the kernel falls back to IPv4 against
            # NetBox's listener. The host-side test path still exercises IPv6.
            NETBOX_PUBLIC_HOST='netbox-e2e'
          else
            INSPECT_FIELD='.IPAddress'
            NETBOX_PUBLIC_HOST=''
          fi

          PROXMOX_MOCK_IP=$(docker inspect -f "{{range .NetworkSettings.Networks}}{{${INSPECT_FIELD}}}{{end}}" proxmox-e2e-mock)
          NETBOX_IP=$(docker inspect -f "{{range .NetworkSettings.Networks}}{{${INSPECT_FIELD}}}{{end}}" netbox-e2e)
          PROXBOX_API_IP=$(docker inspect -f "{{range .NetworkSettings.Networks}}{{${INSPECT_FIELD}}}{{end}}" proxbox-e2e-api)

          if [ -z "${NETBOX_PUBLIC_HOST}" ]; then
            NETBOX_PUBLIC_HOST="${NETBOX_IP}"
          fi

          echo "PROXMOX_MOCK_IP=$PROXMOX_MOCK_IP"
          echo "NETBOX_IP=$NETBOX_IP"
          echo "PROXBOX_API_IP=$PROXBOX_API_IP"
          echo "NETBOX_PUBLIC_HOST=$NETBOX_PUBLIC_HOST"

          {
            echo "PROXMOX_MOCK_IP=$PROXMOX_MOCK_IP"
            echo "NETBOX_IP=$NETBOX_IP"
            echo "PROXBOX_API_IP=$PROXBOX_API_IP"
            echo "NETBOX_PUBLIC_HOST=$NETBOX_PUBLIC_HOST"
          } >> "$GITHUB_ENV"

      - name: Wait for stack readiness and create NetBox API token
        run: |
          set -eux
          for i in $(seq 1 600); do
            http_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' "http://${TEST_HOST}:18080/api/" 2>/dev/null || true)"
            if [ "$http_code" -ge 100 ] 2>/dev/null && [ "$http_code" -lt 500 ]; then
              break
            fi
            sleep 2
            if [ "$i" -eq 600 ]; then
              echo "NetBox did not become ready"
              docker logs netbox-e2e || true
              exit 1
            fi
          done

          for i in $(seq 1 90); do
            # shellcheck disable=SC2086
            if curl ${PROXMOX_MOCK_PROBE_FLAGS} --max-time 5 "${PROXMOX_MOCK_PROBE_URL}" >/dev/null 2>&1; then
              break
            fi
            sleep 2
            if [ "$i" -eq 90 ]; then
              echo "proxmox mock did not become ready"
              docker logs proxmox-e2e-mock || true
              exit 1
            fi
          done

          for i in $(seq 1 90); do
            http_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' "http://${TEST_HOST}:18800/" 2>/dev/null || true)"
            if [ "$http_code" -ge 100 ] 2>/dev/null && [ "$http_code" -lt 500 ]; then
              break
            fi
            sleep 2
            if [ "$i" -eq 90 ]; then
              echo "proxbox-api did not become ready"
              docker logs proxbox-e2e-api || true
              exit 1
            fi
          done

          TOKEN_OUTPUT=$(docker exec netbox-e2e /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell -c "from users.models import Token, User; u=User.objects.get(username='admin'); t=Token.objects.create(user=u, version=1, token='aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'); print(f'{t.id}:{t.plaintext}')")
          TOKEN_ID=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f1)
          TOKEN_VALUE=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f2)

          echo "NETBOX_TOKEN_ID=$TOKEN_ID" >> "$GITHUB_ENV"
          echo "NETBOX_API_TOKEN=$TOKEN_VALUE" >> "$GITHUB_ENV"

      - name: Seed proxbox discovery tags in NetBox
        # proxbox-api's startup bootstrap cannot seed these tags because it has
        # no NetBoxEndpoint row yet at startup time (the plugin registers one
        # only after proxbox-api is already running). With
        # PROXBOX_SKIP_NETBOX_BOOTSTRAP=true we instead seed the discovery tags
        # directly through the NetBox REST API here so device_ensure and
        # similar reconciliation paths have the tags they expect.
        run: |
          set -eu
          AUTH="Authorization: Token ${NETBOX_API_TOKEN}"
          CT="Content-Type: application/json"
          URL="http://${TEST_HOST}:18080/api/extras/tags/"

          create_tag() {
            name="$1"; slug="$2"; color="$3"
            body=$(printf '{"name":"%s","slug":"%s","color":"%s"}' "$name" "$slug" "$color")
            http_code=$(curl -sS -o /tmp/tag.out -w '%{http_code}' \
              -X POST -H "$AUTH" -H "$CT" -d "$body" "$URL")
            if [ "$http_code" = "201" ]; then
              echo "Created tag: $name"
            elif [ "$http_code" = "400" ] && grep -q "already exists" /tmp/tag.out; then
              echo "Tag already exists: $name"
            else
              echo "Failed to create tag $name (HTTP $http_code):" >&2
              cat /tmp/tag.out >&2 || true
              exit 1
            fi
          }

          create_tag "Proxbox" "proxbox" "ff5722"
          create_tag "proxbox-discovered-qemu" "proxbox-discovered-qemu" "9c27b0"
          create_tag "proxbox-discovered-lxc" "proxbox-discovered-lxc" "9c27b0"
          create_tag "proxbox-discovered-cluster" "proxbox-discovered-cluster" "9c27b0"
          create_tag "proxbox-discovered-node" "proxbox-discovered-node" "9c27b0"

      - name: Start NetBox rqworker
        run: |
          set -eux
          SECRET_KEY='proxbox-e2e-secret-key-proxbox-e2e-secret-key-proxbox-e2e-secret-key'

          if [ -n "${NETBOX_PLUGIN_MOUNT}" ]; then
            # shellcheck disable=SC2086
            docker run -d --name netbox-e2e-rqworker --network proxbox-e2e ${NETBOX_PLUGIN_MOUNT} \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "i=0; until uv pip install --upgrade ${NETBOX_PLUGIN_INSTALL_INDEX} ${NETBOX_PLUGIN_INSTALL_SPEC}; do i=\$((i+1)); [ \$i -ge 30 ] && exit 1; sleep 10; done && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\n' > /etc/netbox/config/plugins.py && /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker"
          else
            docker run -d --name netbox-e2e-rqworker --network proxbox-e2e \
              -e DB_HOST=netbox-e2e-postgres \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=netbox-e2e-redis \
              -e REDIS_DATABASE=0 \
              -e REDIS_CACHE_HOST=netbox-e2e-redis \
              -e REDIS_CACHE_DATABASE=1 \
              -e REDIS_TASK_HOST=netbox-e2e-redis \
              -e REDIS_TASK_DATABASE=2 \
              -e SECRET_KEY="$SECRET_KEY" \
              --entrypoint /bin/bash \
              "${NETBOX_IMAGE}" -ec "i=0; until uv pip install --upgrade ${NETBOX_PLUGIN_INSTALL_INDEX} ${NETBOX_PLUGIN_INSTALL_SPEC}; do i=\$((i+1)); [ \$i -ge 30 ] && exit 1; sleep 10; done && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_proxbox\"]\n' > /etc/netbox/config/plugins.py && /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker"
          fi

      - name: Run stack e2e checks
        env:
          NETBOX_BASE_URL: http://${{ env.TEST_HOST }}:18080
          PROXBOX_BASE_URL: http://${{ env.TEST_HOST }}:18800
          PROXMOX_MOCK_BASE_URL: ${{ env.PROXMOX_MOCK_BASE_URL }}
          PROXMOX_MOCK_IP: ${{ env.PROXMOX_MOCK_IP }}
          NETBOX_IP: ${{ env.NETBOX_IP }}
          PROXBOX_API_IP: ${{ env.PROXBOX_API_IP }}
          NETBOX_PUBLIC_URL: http://${{ env.NETBOX_PUBLIC_HOST }}:8080
          NETBOX_TOKEN_ID: ${{ env.NETBOX_TOKEN_ID }}
          NETBOX_API_TOKEN: ${{ env.NETBOX_API_TOKEN }}
          PROXMOX_SERVICE: ${{ matrix.proxmox_service }}
        run: |
          python tests/e2e/e2e_stack_check.py

      - name: Smoke test single-exec compose (issue #371)
        # Run only against the local install source: published wheels on
        # v0.0.14 and earlier do not yet ship `proxbox_sync`. Other install
        # sources start exercising this once v0.0.15 is on PyPI.
        if: matrix.install_source == 'local' && matrix.proxmox_service == 'pve'
        env:
          NETBOX_IMAGE: ${{ matrix.netbox_image }}
        run: |
          set -eux
          # 1. Parse the compose file end-to-end. Catches YAML / env-var errors.
          docker compose -f docs/installation/docker-compose-single-exec.yml config --quiet

          # 2. Run it for real, attached to the live e2e stack via env-var overrides.
          # Mount the in-tree source at /tmp/netbox-proxbox so the script's
          # `uv pip install /tmp/netbox-proxbox` resolves to the branch being tested.
          SECRET_KEY='proxbox-e2e-secret-key-proxbox-e2e-secret-key-proxbox-e2e-secret-key'
          NETBOX_ENV_FILE=/dev/null \
          NETBOX_NETWORK=proxbox-e2e \
          PROXBOX_SYNC_TIMEOUT=600 \
          NETBOX_PROXBOX_PIP_SPEC=/tmp/netbox-proxbox \
          docker compose -f docs/installation/docker-compose-single-exec.yml run --rm \
            -v "$PWD:/tmp/netbox-proxbox:ro" \
            -e DB_HOST=netbox-e2e-postgres \
            -e DB_NAME=netbox \
            -e DB_USER=netbox \
            -e DB_PASSWORD=netbox \
            -e REDIS_HOST=netbox-e2e-redis \
            -e REDIS_DATABASE=0 \
            -e REDIS_CACHE_HOST=netbox-e2e-redis \
            -e REDIS_CACHE_DATABASE=1 \
            -e REDIS_TASK_HOST=netbox-e2e-redis \
            -e REDIS_TASK_DATABASE=2 \
            -e SECRET_KEY="$SECRET_KEY" \
            -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox" \
            netbox

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== NetBox logs ==="
          docker logs netbox-e2e || true
          echo "=== RQ Worker logs ==="
          docker logs netbox-e2e-rqworker || true
          echo "=== Proxbox API logs ==="
          docker logs proxbox-e2e-api || true
          echo "=== Proxmox Mock logs (${PROXMOX_MOCK_IMAGE_REF:-${PROXMOX_SDK_IMAGE}:${PROXMOX_SDK_TAG_PREFIX}-${{ matrix.proxmox_service }}}) ==="
          docker logs proxmox-e2e-mock || true
          echo "=== Postgres logs ==="
          docker logs netbox-e2e-postgres || true
          echo "=== Redis logs ==="
          docker logs netbox-e2e-redis || true

      - name: Cleanup stack
        if: always()
        run: |
          docker rm -f netbox-e2e-rqworker netbox-e2e proxbox-e2e-api proxmox-e2e-mock netbox-e2e-postgres netbox-e2e-redis 2>/dev/null || true
          docker network rm proxbox-e2e 2>/dev/null || true
